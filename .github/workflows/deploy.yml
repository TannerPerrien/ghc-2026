name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: app

      - name: Build
        run: pnpm run build
        working-directory: app
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Flatten pre-rendered output
        run: |
          cp -r app/build/client/${{ github.event.repository.name }}/. app/build/client/
          rm -rf app/build/client/${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
